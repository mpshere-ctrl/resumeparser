<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Career Copilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-4xl mx-auto p-4 md:p-8 space-y-6">
        
        <!-- Header & Auth -->
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-blue-600">Gemini Career Copilot</h1>
                <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">AI-Powered Career Intelligence</p>
            </div>
            <div id="authArea">
                <button id="loginBtn" class="bg-slate-900 text-white px-6 py-2 rounded-full font-bold hover:bg-slate-800 transition">Sign In with Google</button>
                <div id="userInfo" class="hidden flex items-center gap-4">
                    <div class="text-right">
                        <p id="userNameDisplay" class="text-sm font-bold"></p>
                        <button id="logoutBtn" class="text-xs text-red-500 hover:underline">Sign Out</button>
                    </div>
                    <img id="userImg" class="w-10 h-10 rounded-full border-2 border-blue-100">
                </div>
            </div>
        </header>

        <!-- Main Interface (Hidden until login) -->
        <main id="appInterface" class="hidden space-y-6">
            
            <!-- API Key Section -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-2">1. Your Gemini API Key (Stored Locally)</label>
                <input type="password" id="geminiKey" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Paste AIzaSy... key here">
                <p class="text-[10px] text-slate-400 mt-2">This key is saved in your browser's local storage for security.</p>
            </section>

            <!-- Profile Memory Section -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">2. Professional Background Memory</h2>
                    <span id="syncStatus" class="text-[10px] font-bold px-2 py-1 rounded bg-slate-100 text-slate-500 uppercase">No Data in Cloud</span>
                </div>
                
                <form id="profileForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="border-2 border-dashed border-slate-200 p-4 rounded-xl text-center hover:border-blue-300 transition">
                            <input type="file" id="resumeFiles" multiple accept=".pdf,.docx" class="hidden">
                            <label for="resumeFiles" class="cursor-pointer text-sm text-slate-600 block">
                                <strong>Upload Resumes</strong><br>(PDF or DOCX, max 5)
                            </label>
                        </div>
                        <textarea id="linkedinText" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm h-24" placeholder="Paste LinkedIn summary or extra bio details..."></textarea>
                    </div>
                    <button type="submit" id="saveProfileBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Update Cloud Profile</button>
                </form>
            </section>

            <!-- Action Section -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-4">3. Target Job Description</h2>
                <textarea id="jobDesc" rows="5" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm mb-4" placeholder="Paste the job requirements here..."></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                    <button id="analyzeBtn" class="bg-amber-500 text-white py-4 rounded-xl font-bold hover:bg-amber-600 transition shadow-lg shadow-amber-100">Analyze Fit</button>
                    <button id="tailorBtn" class="bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-100">Tailor Resume</button>
                </div>
            </section>

            <!-- Results Output -->
            <div id="resultsArea" class="space-y-6">
                <div id="analysisResult" class="hidden p-6 bg-amber-50 border border-amber-100 rounded-2xl whitespace-pre-wrap text-sm leading-relaxed text-amber-900"></div>
                <div id="resumeResult" class="hidden bg-white p-6 rounded-2xl border border-slate-200 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-slate-800">Generated Tailored Resume</h3>
                        <button id="downloadDocx" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-200 transition">Download .docx</button>
                    </div>
                    <div id="resumeOutputText" class="font-mono text-[11px] whitespace-pre-wrap bg-slate-50 p-6 border rounded-xl overflow-x-auto"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzUhTIuszpODRYti4gS7ks7ewbIxzvVDM",
            authDomain: "resumeparser-e6d7b.firebaseapp.com",
            projectId: "resumeparser-e6d7b",
            storageBucket: "resumeparser-e6d7b.firebasestorage.app",
            messagingSenderId: "504154767045",
            appId: "1:504154767045:web:fd4db241e37215f3f57aac",
            measurementId: "G-3RKLYGLMGD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let cloudProfile = null;

        // --- LOCAL STORAGE KEY PERSISTENCE ---
        const keyField = document.getElementById('geminiKey');
        keyField.value = localStorage.getItem('gemini_api_key') || '';
        keyField.oninput = () => localStorage.setItem('gemini_api_key', keyField.value);

        // --- AUTH LOGIC ---
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('appInterface').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = user.displayName;
                document.getElementById('userImg').src = user.photoURL;
                await fetchCloudProfile();
            } else {
                currentUser = null;
                location.reload(); // Refresh to clear state
            }
        });

        async function fetchCloudProfile() {
            const docRef = doc(db, "profiles", currentUser.uid);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                cloudProfile = snap.data();
                document.getElementById('syncStatus').innerText = "Profile Synced";
                document.getElementById('syncStatus').className = "text-[10px] font-bold px-2 py-1 rounded bg-green-100 text-green-700 uppercase";
            }
        }

        // --- BACKEND WRAPPERS ---
        async function apiCall(endpoint, body) {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-gemini-key': keyField.value
                },
                body: JSON.stringify(body)
            });
            if (!response.ok) {
                const err = await response.text();
                throw new Error(err);
            }
            return response.json();
        }

        // --- ACTIONS ---
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            btn.innerText = "Syncing with AI & Cloud...";
            btn.disabled = true;

            const fd = new FormData();
            const fileInput = document.getElementById('resumeFiles');
            for (let i = 0; i < fileInput.files.length; i++) fd.append('resumes', fileInput.files[i]);
            fd.append('linkedinText', document.getElementById('linkedinText').value);

            try {
                const res = await fetch('/api/ingest-profile', {
                    method: 'POST',
                    headers: { 'x-gemini-key': keyField.value },
                    body: fd
                });
                const data = await res.json();
                
                // Save to Firestore
                cloudProfile = { 
                    userName: data.extractedName, 
                    profileText: data.fullText, 
                    uid: currentUser.uid, 
                    updatedAt: Date.now() 
                };
                await setDoc(doc(db, "profiles", currentUser.uid), cloudProfile);
                
                alert(`Success! Profile updated for ${data.extractedName}`);
                await fetchCloudProfile();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.innerText = "Update Cloud Profile";
                btn.disabled = false;
            }
        };

        document.getElementById('analyzeBtn').onclick = async () => {
            if (!cloudProfile) return alert("Upload your profile first!");
            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "Analyzing...";
            try {
                const data = await apiCall('/api/analyze-suitability', {
                    userName: cloudProfile.userName,
                    profileText: cloudProfile.profileText,
                    jobDescription: document.getElementById('jobDesc').value
                });
                document.getElementById('analysisResult').innerText = data.analysis;
                document.getElementById('analysisResult').classList.remove('hidden');
            } catch (err) { alert(err.message); }
            finally { btn.innerText = "Match Analysis"; }
        };

        let currentResumeText = "";
        document.getElementById('tailorBtn').onclick = async () => {
            if (!cloudProfile) return alert("Upload your profile first!");
            const btn = document.getElementById('tailorBtn');
            btn.innerText = "Tailoring...";
            try {
                const data = await apiCall('/api/tailor-resume', {
                    userName: cloudProfile.userName,
                    profileText: cloudProfile.profileText,
                    jobDescription: document.getElementById('jobDesc').value
                });
                currentResumeText = data.tailoredText;
                document.getElementById('resumeOutputText').innerText = currentResumeText;
                document.getElementById('resumeResult').classList.remove('hidden');
            } catch (err) { alert(err.message); }
            finally { btn.innerText = "Tailor Resume"; }
        };

        document.getElementById('downloadDocx').onclick = async () => {
            const res = await fetch('/api/download-docx', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ resumeText: currentResumeText })
            });
            const blob = await res.blob();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Tailored_Resume.docx";
            link.click();
        };
    </script>
</body>
</html>
