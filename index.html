<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Copilot v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-4xl mx-auto p-8 space-y-6">
        
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border">
            <h1 class="text-2xl font-black text-blue-600">Career Copilot</h1>
            <div id="authArea">
                <button id="loginBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Sign In</button>
                <div id="userInfo" class="hidden flex items-center gap-4">
                    <span id="displayName" class="font-bold"></span>
                    <button id="logoutBtn" class="text-red-500 text-sm">Logout</button>
                </div>
            </div>
        </header>

        <main id="appInterface" class="hidden space-y-6">
            <input type="password" id="geminiKey" class="w-full p-3 border rounded-xl" placeholder="Gemini API Key">

            <section class="bg-white p-6 rounded-2xl border">
                <h2 class="font-bold mb-4">Profile Sync</h2>
                <input type="file" id="resumeFiles" multiple class="mb-4 block w-full text-sm">
                <textarea id="linkedinText" class="w-full p-3 border rounded-xl mb-4" placeholder="LinkedIn Bio..."></textarea>
                <button id="syncBtn" class="w-full bg-black text-white py-3 rounded-xl font-bold">Sync & Save to Cloud</button>
            </section>

            <section class="bg-white p-6 rounded-2xl border">
                <textarea id="jobDesc" rows="4" class="w-full p-3 border rounded-xl mb-4" placeholder="Job Description..."></textarea>
                <button id="tailorBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Tailor Resume</button>
            </section>

            <div id="resumeView" class="hidden bg-white p-6 rounded-2xl border">
                <button id="downloadBtn" class="bg-blue-600 text-white px-4 py-2 rounded mb-4">Download .docx</button>
                <pre id="resumeText" class="bg-slate-100 p-4 rounded text-xs overflow-x-auto"></pre>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- CONFIGURATION ---
        const BACKEND_URL = "https://your-backend-app.onrender.com"; // MUST BE HTTPS
        const firebaseConfig = {
            apiKey: "AIzaSyBzUhTIuszpODRYti4gS7ks7ewbIxzvVDM",
            authDomain: "resumeparser-e6d7b.firebaseapp.com",
            projectId: "resumeparser-e6d7b",
            storageBucket: "resumeparser-e6d7b.firebasestorage.app",
            messagingSenderId: "504154767045",
            appId: "1:504154767045:web:fd4db241e37215f3f57aac"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let currentUser = null;

        // --- CORE API HELPER ---
        async function apiCall(endpoint, method, body, isFile = false) {
            const key = document.getElementById('geminiKey').value;
            const headers = { 'x-gemini-key': key };
            if (!isFile) headers['Content-Type'] = 'application/json';

            try {
                const response = await fetch(`${BACKEND_URL}${endpoint}`, {
                    method, headers, body: isFile ? body : JSON.stringify(body)
                });
                if (!response.ok) throw new Error(await response.text());
                const type = response.headers.get("content-type");
                return type.includes("json") ? response.json() : response.blob();
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Failed to fetch. Ensure Backend is HTTPS and Brave Shields are OFF.");
                throw err;
            }
        }

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('appInterface').classList.remove('hidden');
                document.getElementById('displayName').innerText = user.displayName;
            } else {
                document.getElementById('appInterface').classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // --- SYNC LOGIC (Full File) ---
        document.getElementById('syncBtn').onclick = async () => {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "Syncing...";
            
            const fd = new FormData();
            const files = document.getElementById('resumeFiles').files;
            for (let f of files) fd.append('resumes', f);
            fd.append('linkedinText', document.getElementById('linkedinText').value);

            try {
                const data = await apiCall('/api/ingest-profile', 'POST', fd, true);
                await setDoc(doc(db, "profiles", currentUser.uid), {
                    userName: data.extractedName,
                    profileText: data.fullText
                });
                alert("Profile Context Saved to Cloud!");
            } catch (e) {} finally { btn.innerText = "Sync & Save to Cloud"; }
        };

        // --- TAILOR LOGIC (Full File) ---
        document.getElementById('tailorBtn').onclick = async () => {
            const btn = document.getElementById('tailorBtn');
            btn.innerText = "AI is Writing...";
            
            const docSnap = await getDoc(doc(db, "profiles", currentUser.uid));
            if (!docSnap.exists()) return alert("Sync profile first!");
            
            const profile = docSnap.data();
            try {
                const data = await apiCall('/api/tailor-resume', 'POST', {
                    userName: profile.userName,
                    profileText: profile.profileText,
                    jobDescription: document.getElementById('jobDesc').value
                });
                document.getElementById('resumeText').innerText = data.tailoredText;
                document.getElementById('resumeView').classList.remove('hidden');
            } catch (e) {} finally { btn.innerText = "Tailor Resume"; }
        };

        // --- DOWNLOAD LOGIC ---
        document.getElementById('downloadBtn').onclick = async () => {
            const blob = await apiCall('/api/download-docx', 'POST', { 
                resumeText: document.getElementById('resumeText').innerText 
            });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "Tailored_Resume.docx"; a.click();
        };
    </script>
</body>
</html>
