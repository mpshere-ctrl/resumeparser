<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Copilot v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Browser-side Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">
    <div class="max-w-4xl mx-auto p-4 md:p-8 space-y-6">
        
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-blue-600">Career Copilot</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase">v3.3 - Serverless (GitHub Pages)</p>
            </div>
            <div id="authArea">
                <button id="loginBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Sign In with Google</button>
                <div id="userInfo" class="hidden flex items-center gap-4">
                    <span id="displayName" class="text-sm font-bold"></span>
                    <button id="logoutBtn" class="text-xs text-red-500 hover:underline">Logout</button>
                </div>
            </div>
        </header>

        <main id="appInterface" class="hidden space-y-6">
            <section class="bg-white p-6 rounded-2xl border border-slate-200">
                <label class="block text-xs font-bold mb-2 uppercase text-slate-500">1. Gemini API Key</label>
                <input type="password" id="geminiKey" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Paste AIzaSy... key here">
            </section>

            <section class="bg-white p-6 rounded-2xl border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold">2. Cloud Profile Context</h2>
                    <span id="syncStatus" class="text-[10px] bg-slate-100 text-slate-500 p-1 px-2 rounded font-bold uppercase">Ready</span>
                </div>
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="file" id="resumeFiles" multiple accept=".pdf,.docx" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700">
                        <textarea id="linkedinText" class="w-full p-3 bg-slate-50 border rounded-xl h-20 text-sm" placeholder="LinkedIn bio..."></textarea>
                    </div>
                    <button id="syncBtn" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-black transition">Process & Save to Cloud</button>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl border border-slate-200">
                <h2 class="font-bold mb-4">3. Target Job & Analysis</h2>
                <textarea id="jobDesc" rows="4" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 text-sm" placeholder="Paste Job Description or URL..."></textarea>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button id="analyzeBtn" class="w-full bg-amber-500 text-white py-3 rounded-xl font-bold hover:bg-amber-600">Analyze Suitability</button>
                    <button id="tailorBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700">Tailor Resume</button>
                </div>
            </section>

            <div id="outputArea" class="space-y-6">
                <div id="analysisArea" class="hidden space-y-4">
                    <div class="bg-amber-50 border border-amber-200 p-6 rounded-2xl">
                        <h3 class="text-amber-800 font-bold mb-2">📊 Suitability Report</h3>
                        <div id="analysisReport" class="text-sm text-amber-900 whitespace-pre-wrap"></div>
                    </div>
                </div>

                <div id="resumeView" class="hidden bg-white p-6 rounded-2xl border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-sm">Tailored Resume</h3>
                        <button id="downloadBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Download .docx</button>
                    </div>
                    <div id="resumeText" class="font-mono text-[10px] whitespace-pre-wrap bg-slate-50 p-6 border rounded-xl max-h-96 overflow-y-auto"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Link to the external app.js -->
    <script type="module" src="app.js"></script>
</body>
</html>
