<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeParser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            background-attachment: fixed;
        }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
        }
        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            background: rgba(0, 0, 0, 0.4);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen text-slate-200 antialiased">
    <div class="max-w-6xl mx-auto p-6 md:p-12 space-y-12">
        
        <header class="flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight text-white">RESUME<span class="text-blue-500">PARSER</span></h1>
            <div id="authArea">
                <button id="loginBtn" class="glass px-8 py-2.5 rounded-full text-sm font-medium hover:bg-white/5 transition border border-white/10">Sign In</button>
                <div id="userInfo" class="hidden flex items-center gap-6">
                    <span id="displayName" class="text-sm font-medium text-slate-400"></span>
                    <button id="logoutBtn" class="text-xs text-slate-500 hover:text-red-400 transition uppercase tracking-widest font-bold">Logout</button>
                </div>
            </div>
        </header>

        <main id="appInterface" class="hidden space-y-10">
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <section class="glass-card p-8 rounded-3xl space-y-6">
                    <div>
                        <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em] mb-4">Configuration</h2>
                        <input type="password" id="geminiKey" class="input-field w-full p-3.5 rounded-xl text-xs" placeholder="API Key">
                    </div>
                    <div class="pt-4 border-t border-white/5">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em]">Status</h2>
                            <span id="syncStatus" class="text-[9px] text-slate-500 uppercase font-bold">Disconnected</span>
                        </div>
                        <button id="syncBtn" class="w-full bg-white text-black py-3.5 rounded-xl font-bold text-xs hover:bg-slate-200 transition uppercase tracking-wider">Synchronize Profile</button>
                    </div>
                </section>

                <section class="glass-card p-8 rounded-3xl lg:col-span-2">
                    <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em] mb-6">Profile Context</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="relative group h-32">
                            <input type="file" id="resumeFiles" multiple accept=".pdf,.docx" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="input-field h-full rounded-2xl flex flex-col items-center justify-center text-center group-hover:border-blue-500/50 transition border-dashed">
                                <span class="text-xs font-semibold text-slate-300">Upload Documents</span>
                                <span class="text-[10px] text-slate-500 mt-1">PDF or DOCX</span>
                            </div>
                        </div>
                        <textarea id="linkedinText" class="input-field w-full p-4 rounded-2xl text-xs h-32 resize-none" placeholder="Professional Summary / LinkedIn Data"></textarea>
                    </div>
                </section>
            </div>

            <section class="glass-card p-10 rounded-[2.5rem]">
                <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em] mb-8 text-center">Target Job Specification</h2>
                <textarea id="jobDesc" rows="5" class="input-field w-full p-5 rounded-2xl text-sm mb-8 resize-none" placeholder="Paste Job Description or URL"></textarea>
                <div class="flex flex-col sm:flex-row gap-6">
                    <button id="analyzeBtn" class="flex-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-blue-500/20 transition">Analyze Fit</button>
                    <button id="tailorBtn" class="flex-1 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-emerald-500/20 transition">Tailor Resume</button>
                </div>
            </section>

            <div id="outputArea" class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div id="analysisArea" class="hidden glass-card p-10 rounded-[2.5rem]">
                    <h3 class="text-white font-bold mb-6 flex items-center gap-3 text-sm tracking-tight">
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> Suitability Report
                    </h3>
                    <div id="analysisReport" class="text-sm text-slate-400 whitespace-pre-wrap leading-relaxed font-medium"></div>
                </div>

                <div id="resumeView" class="hidden glass-card p-10 rounded-[2.5rem]">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-white font-bold text-sm tracking-tight">Tailored Document</h3>
                        <button id="downloadBtn" class="bg-white text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter hover:bg-slate-200 transition">Download .docx</button>
                    </div>
                    <div id="resumeText" class="font-mono text-[11px] text-slate-400 whitespace-pre-wrap bg-black/40 p-8 rounded-2xl border border-white/5 max-h-[500px] overflow-y-auto"></div>
                </div>
            </div>

            <section class="glass-card p-10 rounded-[2.5rem] max-w-3xl mx-auto">
                <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em] mb-8 flex items-center gap-3">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Consultation Chat
                </h2>
                <div id="chatBox" class="h-80 overflow-y-auto space-y-6 mb-8 pr-4">
                    <div class="text-[11px] text-slate-500 font-medium">
                        System ready. Provide queries regarding your profile or the target role for objective feedback.
                    </div>
                </div>
                <div class="relative">
                    <input type="text" id="chatInput" class="input-field w-full p-5 pr-28 rounded-2xl text-sm" placeholder="Message assistant...">
                    <button id="chatSendBtn" class="absolute right-2.5 top-2.5 bottom-2.5 bg-blue-600 text-white px-8 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-blue-500 transition">Send</button>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
